name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Publish @agenticapps/dashboard-agent
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # id-token: write — required for npm provenance, but the source repo is
      # currently private and npm rejects provenance from private repos
      # (E422 "Unsupported GitHub Actions source repository visibility").
      # Re-enable in lockstep with `--provenance` when the repo goes public.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js (with npm registry auth)
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test --run

      - name: Build agent
        run: pnpm --filter @agenticapps/dashboard-agent build

      - name: Validate package exports (publint)
        working-directory: packages/agent
        run: pnpm dlx publint

      - name: Validate type exports (arethetypeswrong)
        working-directory: packages/agent
        run: pnpm dlx --package=@arethetypeswrong/cli attw --pack . --profile esm-only

      # Provenance is intentionally OFF until the repo is made public —
      # see permissions block above. Re-add `--provenance` and the matching
      # `id-token: write` permission together; npm enforces this pairing.
      - name: Publish to npm
        working-directory: packages/agent
        run: pnpm publish --access public --no-git-checks --tag alpha
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
