name: CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**', 'chore/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit SHAs (not tags). Comments mark the tag at
      # pinning time so dependabot/renovate can update. See release.yml for
      # the supply-chain rationale.
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6

      - name: Setup Node.js (from .nvmrc)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      # Build before test: shared's package.json exports point to ./dist/index.js
      # for runtime imports, so vitest in downstream packages (agent/spa) can't
      # resolve cross-package imports without dist/ on a fresh CI checkout.
      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test --run
